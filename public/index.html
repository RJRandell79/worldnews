<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsLocator — World News Heatmap</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    header h1 span { color: #ff6b35; }

    #status { font-size: 0.8rem; color: #555; }
    #status.live { color: #4caf50; }
    #status.live::before { content: '● '; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    main { display: flex; flex: 1; overflow: hidden; }

    /* Map */
    #map-container {
      flex: 1;
      position: relative;
      background: #080818;
      overflow: hidden;
    }
    #map-container svg { width: 100%; height: 100%; }

    .country {
      stroke: #2e2e52;
      stroke-width: 0.4px;
      transition: fill 0.7s ease;
      cursor: pointer;
    }
    .country:hover { stroke: #ffffff88; stroke-width: 1px; }

    #tooltip {
      display: none;
      position: fixed;
      background: rgba(20, 20, 40, 0.96);
      border: 1px solid #3a3a6a;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.85rem;
      pointer-events: none;
      z-index: 999;
    }
    #tooltip strong { display: block; font-size: 0.95rem; margin-bottom: 2px; }
    #tooltip .cnt { color: #ff6b35; }

    #legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(20, 20, 40, 0.88);
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.72rem;
    }
    #legend p { text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 6px; }
    #legend-bar { width: 140px; height: 8px; border-radius: 4px; display: block; }
    #legend-labels { display: flex; justify-content: space-between; color: #666; margin-top: 4px; }

    /* Sidebar */
    aside {
      width: 270px;
      background: #13132a;
      border-left: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sh { /* section header */
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #555;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e1e38;
      flex-shrink: 0;
    }

    #top-countries {
      list-style: none;
      padding: 6px 0;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }
    #top-countries li {
      display: flex;
      align-items: center;
      padding: 5px 16px;
      font-size: 0.82rem;
      gap: 8px;
    }
    #top-countries .rank { color: #444; width: 16px; font-size: 0.7rem; flex-shrink: 0; }
    #top-countries .cname { flex: 1; }
    #top-countries .bar-wrap { width: 50px; background: #1e1e38; border-radius: 2px; height: 4px; }
    #top-countries .bar-fill { height: 4px; background: #ff6b35; border-radius: 2px; transition: width .5s; }
    #top-countries .cnt { color: #ff6b35; font-weight: 700; width: 24px; text-align: right; font-size: 0.8rem; }

    #headlines-wrap { flex: 1; overflow-y: auto; }
    #headlines-wrap::-webkit-scrollbar { width: 4px; }
    #headlines-wrap::-webkit-scrollbar-track { background: #13132a; }
    #headlines-wrap::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }

    #headlines { list-style: none; padding: 6px 0; }
    #headlines li { border-bottom: 1px solid #1a1a32; }
    #headlines li:last-child { border-bottom: none; }
    #headlines a {
      display: block;
      padding: 8px 16px;
      color: #b0b0c8;
      text-decoration: none;
      font-size: 0.78rem;
      line-height: 1.45;
    }
    #headlines a:hover { color: #fff; background: #1a1a30; }
    #headlines .src {
      display: block;
      color: #ff6b35;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    #headlines .hl-flags { font-style: normal; letter-spacing: 1px; opacity: 0.75; }

    .country.selected { stroke: #fff !important; stroke-width: 1.5px !important; }

    #headlines-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: #555;
        padding: 14px 12px 10px 16px;
        border-bottom: 1px solid #1e1e38;
        flex-shrink: 0;
    }

    #clear-filter {
        display: none;
        background: none;
        border: 1px solid #3a3a5a;
        color: #777;
        border-radius: 3px;
        cursor: pointer;
        font-size: 0.7rem;
        padding: 2px 6px;
        line-height: 1;
        flex-shrink: 0;
    }

    #clear-filter:hover { color: #fff; border-color: #888; }

    #tooltip .sources {
        display: block;
        color: #888;
        font-size: 0.73rem;
        margin-top: 5px;
        line-height: 1.5;
    }

    #tooltip .sources span {
        display: inline-block;
        background: #2a2a4a;
        border-radius: 3px;
        padding: 1px 5px;
        margin: 1px 2px 1px 0;
        white-space: nowrap;
    }

    @media (max-width: 768px) {
      main { flex-direction: column; }
      aside { width: 100%; height: 280px; border-left: none; border-top: 1px solid #2a2a4a; }
    }
  </style>
</head>
<body>
  <header>
    <h1>News<span>Locator</span></h1>
    <span id="status">Connecting…</span>
  </header>
  <main>
    <div id="map-container">
      <div id="map"></div>
      <div id="tooltip">
        <strong></strong>
        <span class="cnt"></span>
        <span class="sources"></span>
      </div>
      <div id="legend">
        <p>Mentions</p>
        <canvas id="legend-bar" width="140" height="8"></canvas>
        <div id="legend-labels"><span>0</span><span id="legend-max">—</span></div>
      </div>
    </div>
    <aside>
      <div class="sh">Top Countries</div>
      <ol id="top-countries"></ol>
      <div id="headlines-header">
        <span id="headlines-title">Latest Headlines</span>
        <button id="clear-filter" title="Show all headlines">&times; Clear</button>
      </div>
      <div id="headlines-wrap">
        <ul id="headlines"><li style="padding:16px;color:#444;font-size:.8rem">Waiting for data&hellip;</li></ul>
      </div>
    </aside>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script>
    'use strict';

    let mentionHistory = []; // [{capturedAt, mentions}]

    // XSS helpers
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = String(str ?? '');
      return d.innerHTML;
    }
    function safeUrl(url) {
      try {
        const u = new URL(url);
        return ['http:', 'https:'].includes(u.protocol) ? url : '#';
      } catch { return '#'; }
    }
    function flag(iso2) {
        if (!iso2 || iso2.length !== 2) return '';
        const u = iso2.toUpperCase();
        return String.fromCodePoint(u.charCodeAt(0) + 0x1F1A5, u.charCodeAt(1) + 0x1F1A5);
    }

    let countryNames = {};
    let numericToAlpha2 = {};
    let countryPaths = null;
    let currentMentions = {};
    let selectedCountry = null;
    let currentCountryHeadlines = {};
    let allHeadlines = [];
    let currentCountrySources = {};

    const tooltip        = document.getElementById('tooltip');
    const statusEl       = document.getElementById('status');
    const mapDiv         = document.getElementById('map-container');
    const clearBtn       = document.getElementById('clear-filter');
    const headlinesTitle = document.getElementById('headlines-title');

    // — D3 map setup —
    const W = mapDiv.clientWidth;
    const H = mapDiv.clientHeight;

    const svg = d3.select('#map')
      .append('svg')
      .attr('viewBox', `0 0 ${W} ${H}`)
      .attr('preserveAspectRatio', 'xMidYMid meet')
      .style('width', '100%')
      .style('height', '100%');

    const projection = d3.geoNaturalEarth1()
      .scale(W / 6.3)
      .translate([W / 2, H / 2]);

    const pathGen = d3.geoPath().projection(projection);

    const defs = svg.append('defs');
    const glowFilter = defs.append('filter')
        .attr('id', 'glow')
        .attr('x', '-40%').attr('y', '-40%')
        .attr('width', '180%').attr('height', '180%');
    glowFilter.append('feGaussianBlur')
        .attr('stdDeviation', '2.5')
        .attr('result', 'coloredBlur');
    const feMerge = glowFilter.append('feMerge');
    feMerge.append('feMergeNode').attr('in', 'coloredBlur');
    feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

    const colorScale = d3.scaleSequentialLog().interpolator(t => d3.interpolateInferno(0.15 + t * 0.85));

    const mapG = svg.append('g');
    const zoom = d3.zoom().scaleExtent([1, 8]).on('zoom', (event) => mapG.attr('transform', event.transform));
    svg.call(zoom);
    // Override D3's default dblclick-to-zoom with a reset:
    svg.on('dblclick.zoom', () => svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity));

    // Ocean sphere — fills the Natural Earth boundary with a proper ocean colour
    mapG.append('path')
      .datum({ type: 'Sphere' })
      .attr('fill', '#0a1428')
      .attr('stroke', '#162040')
      .attr('stroke-width', 0.8)
      .attr('d', pathGen);

    // Graticule grid
    mapG.append('path')
      .datum(d3.geoGraticule()())
      .attr('fill', 'none')
      .attr('stroke', '#191928')
      .attr('stroke-width', 0.4)
      .attr('stroke-dasharray', '2,3')
      .attr('d', pathGen);

    // Load world topology + country metadata in parallel
    Promise.all([
      d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'),
      fetch('/api/countries').then(r => r.json()),
    ]).then(([world, cData]) => {
      numericToAlpha2 = cData.numericToAlpha2;
      countryNames    = cData.countryNames;

      const features = topojson.feature(world, world.objects.countries).features;

      countryPaths = mapG.selectAll('.country')
        .data(features)
        .join('path')
        .attr('class', 'country')
        .attr('d', pathGen)
        .attr('fill', d => d.id === 10 ? '#111120' : '#252535')
        .on('mouseover', (event, d) => {
          const iso2  = numericToAlpha2[String(d.id)];
          const name  = iso2 && countryNames[iso2];
          if (!name) return;
          const count = currentMentions[iso2] || 0;
          tooltip.querySelector('strong').textContent = flag(iso2) + ' ' + name;
          tooltip.querySelector('.cnt').textContent = count > 0 ? `${count} mention${count !== 1 ? 's' : ''}` : 'No mentions';

          const sources = currentCountrySources[iso2] || {};
          const sourcesEl = tooltip.querySelector('.sources');
          const breakdown = Object.entries(sources)
            .sort(([, a], [, b]) => b - a)
            .slice(0, 5)
            .map(([src, n]) => `<span>${esc(src)} &times;${n}</span>`)
            .join('');
            
          sourcesEl.innerHTML = breakdown;
          tooltip.style.display = 'block';
        })
        .on('mousemove', (event) => {
            const pad = 14;
            const tw  = tooltip.offsetWidth;
            const th  = tooltip.offsetHeight;
            let x = event.clientX + pad;
            let y = event.clientY - 36;
            if (x + tw > window.innerWidth) x = event.clientX - tw - pad;
            if (y < 0) y = event.clientY + pad;
            if (y + th > window.innerHeight) y = window.innerHeight - th - pad;
            tooltip.style.left = x + 'px';
            tooltip.style.top  = y + 'px';
        })
        .on('mouseout', () => { tooltip.style.display = 'none'; })

        .on('click', (event, d) => {
            const iso2 = numericToAlpha2[String(d.id)];
            if (!iso2 || !countryNames[iso2]) { clearFilter(); return; }
            if (selectedCountry === iso2) clearFilter();
            else selectCountry(iso2);
        });

        fetch('/api/history')
            .then(r => r.json())
            .then(h => { mentionHistory = h; })
            .catch(() => {});

      // Country borders overlay
      mapG.append('path')
        .datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b))
        .attr('fill', 'none')
        .attr('stroke', '#2e2e52')
        .attr('stroke-width', 0.4)
        .attr('d', pathGen);

        svg.on('click', (event) => {
            if (event.target.classList.contains('country')) return;
            clearFilter();
        });

        clearBtn.addEventListener('click', clearFilter);

      if (Object.keys(currentMentions).length) {
        applyMentions(currentMentions);
        updateTopCountries(currentMentions);
    }
    }).catch(err => console.error('Map load error:', err));

    function applyMentions(mentions) {
      if (!countryPaths) { currentMentions = mentions; return; }
      const vals = Object.values(mentions).filter(v => v > 0);
      if (!vals.length) return;
      const maxVal = Math.max(...vals);
      colorScale.domain([1, Math.max(2, maxVal)]);

      countryPaths.attr('fill', d => {
        if (d.id === 10) return '#111120';
        const iso2  = numericToAlpha2[String(d.id)];
        const count = (iso2 && mentions[iso2]) || 0;
        return count > 0 ? colorScale(count) : '#252535';
      });

      countryPaths.attr('filter', d => {
        if (d.id === 10) return null;
        const iso2  = numericToAlpha2[String(d.id)];
        const count = (iso2 && mentions[iso2]) || 0;
        return count >= maxVal * 0.5 ? 'url(#glow)' : null;
    });

      drawLegend(maxVal);
    }

    function drawLegend(maxVal) {
      const canvas = document.getElementById('legend-bar');
      const ctx    = canvas.getContext('2d');
      for (let i = 0; i < canvas.width; i++) {
        const t = i / canvas.width;
        ctx.fillStyle = colorScale(Math.max(1, Math.pow(maxVal, t)));
        ctx.fillRect(i, 0, 1, canvas.height);
      }
      document.getElementById('legend-max').textContent = maxVal;
    }

    function updateTopCountries(mentions) {
        const sorted = Object.entries(mentions)
            .filter(([, v]) => v > 0)
            .sort(([, a], [, b]) => b - a)
            .slice(0, 10);
        const maxCount = sorted[0]?.[1] || 1;
        const list = document.getElementById('top-countries');
        list.innerHTML = sorted.length
            ? sorted.map(([iso2, count], i) => `
                <li>
                <span class="rank">${i + 1}</span>
                <span class="cname">${flag(iso2)} ${esc(countryNames[iso2] || iso2)}</span>
                ${sparkline(iso2, maxCount)}
                <span class="cnt">${count}</span>
                </li>`).join('')
            : '<li style="padding:8px 16px;color:#444;font-size:.8rem">No data yet</li>';
        }

        function sparkline(iso2, globalMax) {
        if (mentionHistory.length < 2) {
            // Fall back to static bar if no history yet
            const count = currentMentions[iso2] || 0;
            return `<span class="bar-wrap"><span class="bar-fill" style="width:${Math.round(count/globalMax*100)}%"></span></span>`;
        }
        const W = 50, H = 18;
        const vals = mentionHistory.map(s => s.mentions[iso2] || 0);
        const peak = Math.max(...vals, 1);
        const step = W / (vals.length - 1);
        const points = vals.map((v, i) =>
            `${Math.round(i * step)},${Math.round(H - (v / peak) * (H - 2) - 1)}`
        ).join(' ');
        return `<svg width="${W}" height="${H}" style="flex-shrink:0;overflow:visible">
            <polyline points="${points}" fill="none" stroke="#ff6b35" stroke-width="1.5"
            stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>
        </svg>`;
    }

    function selectCountry(iso2) {
        selectedCountry = iso2;

        // Update map highlight
        countryPaths
            .classed('selected', d => numericToAlpha2[String(d.id)] === iso2);

        // Update sidebar
        const name = countryNames[iso2] || iso2;
        headlinesTitle.textContent = name;
        clearBtn.style.display = 'inline';

        const articles = currentCountryHeadlines[iso2] || [];
        renderHeadlines(
            articles.length ? articles : null,
            articles.length ? null : `No headlines found for ${name}`
        );
    }

    function clearFilter() {
        selectedCountry = null;
        countryPaths?.classed('selected', false);
        headlinesTitle.textContent = 'Latest Headlines';
        clearBtn.style.display = 'none';
        renderHeadlines(allHeadlines);
    }

    function renderHeadlines(headlines, emptyMsg) {
        if (!headlines?.length) {
            document.getElementById('headlines').innerHTML =
            `<li style="padding:16px;color:#444;font-size:.8rem">${emptyMsg || 'No headlines'}</li>`;
            return;
        }
        document.getElementById('headlines').innerHTML = headlines.map(h => {
            const flags = (h.countries || []).map(iso2 => flag(iso2)).join('');
            return `<li><a href="${safeUrl(h.url)}" target="_blank" rel="noopener noreferrer">
                <span class="src">${esc(h.source || 'News')}${flags ? ` <span class="hl-flags">${flags}</span>` : ''}</span>${esc(h.title)}
                </a></li>`;
        }).join('');
    }

    // — Socket.io —
    const socket = io();

    socket.on('connect', () => {
      statusEl.textContent = 'Live';
      statusEl.className = 'live';
    });
    socket.on('disconnect', () => {
      statusEl.textContent = 'Disconnected';
      statusEl.className = '';
    });
    socket.on('newsUpdate', ({ mentions, headlines, countryHeadlines, countrySources, lastUpdated }) => {
        currentMentions         = mentions         || {};
        currentCountryHeadlines = countryHeadlines || {};
        currentCountrySources   = countrySources   || {};
        allHeadlines            = headlines        || [];

        applyMentions(currentMentions);
        updateTopCountries(currentMentions);

        // Re-apply filter if one is active, otherwise show all
        if (selectedCountry) selectCountry(selectedCountry);
        else renderHeadlines(allHeadlines);

        if (lastUpdated) {
            statusEl.textContent = `Live · ${new Date(lastUpdated).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })}`;
            statusEl.className = 'live';
        }
    });
  </script>
</body>
</html>
